<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Jump - Neon High</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="score">0</div>
        
        <div id="start-screen">
            <h1 class="game-title">VIBE JUMP</h1>
            
            <div class="settings-box">
                <p>CONTROLLI:</p>
                <button class="toggle-btn active" id="btnTouch" onclick="setControl('touch')">DITO</button>
                <button class="toggle-btn" id="btnTilt" onclick="setControl('tilt')">INCLINA</button>
            </div>

            <button class="main-play-btn" onclick="startGame()">GIOCA ORA</button>
            <p class="instruction">Tocca "GIOCA ORA" per saltare</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
